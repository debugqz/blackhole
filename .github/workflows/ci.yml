name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rusqlite's bundled-sqlcipher feature links against system OpenSSL;
      # pkg-config + libssl-dev is enough for openssl-sys to find it without
      # setting OPENSSL_DIR by hand. bh-calls (SPEC.md §15) needs real
      # system libopus/libvpx (its Opus/VP8 codec bindings aren't bundled —
      # see crates/bh-calls/Cargo.toml) plus libclang for the bindgen pass
      # env-libvpx-sys runs against whatever libvpx version is installed.
      # Screen sharing's `scap` dependency additionally needs libpipewire +
      # libdbus headers on Linux (its xdg-desktop-portal/PipeWire screencast
      # backend) — macOS/Windows use native platform capture APIs instead
      # and need nothing extra here.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libopus-dev libvpx-dev libclang-dev clang libpipewire-0.3-dev libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  cargo-deny:
    name: Dependency advisories (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  fuzz-smoke:
    name: Fuzz smoke (60s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libclang-dev clang

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # A short, bounded smoke run per target — not the continuous fuzzing
      # program SPEC.md §13 explicitly defers, just enough to catch a
      # regression that makes one of these parsers panic on malformed
      # input. Runs against the attacker-reachable byte parsers: onion
      # packet peeling, sealed-sender envelope unsealing, mailbox manifest
      # deserialization (all bh-network), and plaintext envelope decoding
      # (bh-crypto).
      - name: Fuzz bh-network targets
        working-directory: crates/bh-network
        run: |
          for target in fuzz_onion_peel_layer fuzz_sealed_sender_unseal fuzz_mailbox_manifest; do
            cargo +nightly fuzz run "$target" -- -max_total_time=60
          done

      - name: Fuzz bh-crypto targets
        working-directory: crates/bh-crypto
        run: cargo +nightly fuzz run fuzz_envelope_decode -- -max_total_time=60

  desktop-frontend:
    name: Desktop client (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/desktop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/desktop/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
