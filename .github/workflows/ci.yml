name: CI

on:
  push:
    branches: [main]
  pull_request:
    # `pull_request_target` would let us also branch-check PRs from forks
    # without giving them write secrets, but we don't need fork PRs to do
    # anything secret-gated yet — the release/cd jobs run on `main` only,
    # not on PRs. If/when that's added later, broaden the workflow trigger
    # carefully and use the standard `pull_request_target` fork-PR pattern.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Cheap static-analysis pass for fast PR feedback. Runs only `fmt` +
  # `clippy` — no `cargo build`, no `cargo test`, no fuzzing. Trades a
  # guarantee of "this builds" for a ~2 min feedback loop on style and
  # lints instead of the full ~10 min for the heavyweight job. Bumped
  # for `${NO_BUILD_JOB}`-style opt-outs later by setting `run-fast:
  # false` on a PR via the PR label `full-ci` if needed — out of scope
  # here.
  rust-fast:
    name: Rust fast (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `--workspace` pulls in `client/desktop/src-tauri`, so this needs
      # Tauri's own Linux build deps (webkit2gtk transitively brings in
      # glib/gtk3), not just the crypto/networking crates' own libs — see
      # the `rust` job's own comment on the same package list below.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libclang-dev clang libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # The "real" CI that's currently the only one — full build, full test
  # suite, fuzz smoke. PRs to main get both `rust-fast` (cheap, fast) and
  # `rust` (heavier, slower) so style feedback isn't waiting ten minutes
  # behind a build.
  rust:
    name: Rust (fmt, clippy, build, test)
    runs-on: ubuntu-latest
    # `sccache` is reused between steps in this job via this directory
    # inside the runner's workspace; `Swatinem/rust-cache` then backs it
    # across runs via its own cache. Two layers of caching for two
    # timescales: in-run (sccache's dir, wiped by GitHub at job end) and
    # cross-run (rust-cache, persisted in GH Actions' cache store).
    # Scoped to this job only (not the workflow-level `env:` above) —
    # `rust-fast`/`fuzz-smoke`/`cargo-deny` never install the `sccache`
    # binary, so `RUSTC_WRAPPER` pointing at it there just breaks every
    # cargo invocation with "could not execute process `sccache ...`".
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4

      # rusqlite's bundled-sqlcipher feature links against system OpenSSL;
      # pkg-config + libssl-dev is enough for openssl-sys to find it without
      # setting OPENSSL_DIR by hand. bh-calls (SPEC.md §15) needs real
      # system libopus/libvpx (its Opus/VP8 codec bindings aren't bundled —
      # see crates/bh-calls/Cargo.toml) plus libclang for the bindgen pass
      # env-libvpx-sys runs against whatever libvpx version is installed,
      # plus libasound2-dev for its `cpal` audio-capture dependency's ALSA
      # backend on Linux — this one was previously undeclared here and CI
      # still passed only because ubuntu-latest's runner image happens to
      # ship it already; building infra/bootstrap-node/Dockerfile from a
      # minimal `rust:1-bookworm` base (no such luck) is what surfaced the
      # gap, so it's now explicit rather than accidental. Screen sharing's
      # `scap` dependency additionally needs libpipewire + libdbus headers
      # on Linux (its xdg-desktop-portal/PipeWire screencast backend) —
      # macOS/Windows use native platform capture APIs instead and need
      # nothing extra here. `--workspace` (both here and in `rust-fast`)
      # also pulls in `client/desktop/src-tauri`, which needs Tauri's own
      # Linux build deps — webkit2gtk transitively brings in glib/gtk3,
      # which is why `glib-sys`'s build script (`pkg-config --libs glib-2.0`)
      # was failing before these were added, not just a webkit-specific gap.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libopus-dev libvpx-dev libclang-dev clang libpipewire-0.3-dev libdbus-1-dev libasound2-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Install sccache
        # `sccache` cuts the wall-clock cost of anything not already in
        # `Swatinem/rust-cache`'s cache (cross-run) by reusing crate
        # compilations within the same workflow run. Pairs with this job's
        # own `RUSTC_WRAPPER: sccache` env (not the workflow-level `env:` —
        # see this job's own comment above), and `SCCACHE_DIR` pointing at
        # a temp dir the runner wipes at job end (rust-cache takes over
        # persistence).
        run: |
          curl -fsSL https://github.com/mozilla/sccache/releases/download/v0.7.4/sccache-v0.7.4-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C /tmp
          sudo cp /tmp/sccache-v0.7.4-x86_64-unknown-linux-musl/sccache /usr/local/bin/sccache
          sccache --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # `--frozen` + `--offline` so the build/test/fuzz steps below can't
      # silently drift away from `Cargo.lock`.
      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

  cargo-deny:
    name: Dependency advisories (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  fuzz-smoke:
    name: Fuzz smoke (60s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libclang-dev clang

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # A short, bounded smoke run per target — not the continuous fuzzing
      # program SPEC.md §13 explicitly defers, just enough to catch a
      # regression that makes one of these parsers panic on malformed
      # input. Runs against the attacker-reachable byte parsers: onion
      # packet peeling, sealed-sender envelope unsealing, mailbox manifest
      # deserialization (all bh-network), and plaintext envelope decoding
      # (bh-crypto).
      - name: Fuzz bh-network targets
        working-directory: crates/bh-network
        run: |
          for target in fuzz_onion_peel_layer fuzz_sealed_sender_unseal fuzz_mailbox_manifest; do
            cargo +nightly fuzz run "$target" -- -max_total_time=60
          done

      - name: Fuzz bh-crypto targets
        working-directory: crates/bh-crypto
        run: cargo +nightly fuzz run fuzz_envelope_decode -- -max_total_time=60

  desktop-frontend:
    name: Desktop client (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/desktop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      # pnpm 11 requires Node >= 22.13 (it crashes on startup, `node:sqlite`
      # not existing yet, under Node 20) — keep these two in lockstep.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/desktop/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
