name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rusqlite's bundled-sqlcipher feature links against system OpenSSL;
      # pkg-config + libssl-dev is enough for openssl-sys to find it without
      # setting OPENSSL_DIR by hand. bh-calls (SPEC.md §15) needs real
      # system libopus/libvpx (its Opus/VP8 codec bindings aren't bundled —
      # see crates/bh-calls/Cargo.toml) plus libclang for the bindgen pass
      # env-libvpx-sys runs against whatever libvpx version is installed.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libopus-dev libvpx-dev libclang-dev clang

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  desktop-frontend:
    name: Desktop client (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/desktop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/desktop/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
