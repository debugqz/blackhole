# Reference deployment for the three infra pieces Blackhole's code is
# ready for but nothing here auto-deploys to a real cloud account — see
# ../README.md before running this anywhere but your own machine/VM.
# Copy .env.example to .env and fill in real values first.
#
#   docker compose -f infra/docker-compose.yml up -d --build
#
# Services:
#   bootstrap-node — a DHT bootstrap node other daemons'
#                    BLACKHOLE_BOOTSTRAP_PEERS can point at.
#   push-relay     — the opaque wake-relay (crates/bh-push-relay), fronted
#                    by Caddy so it's reachable over https:// (bh-api's
#                    relay_url accepts http:// too, but the token would
#                    then travel in cleartext — see README "Why Caddy").
#   caddy          — automatic-HTTPS TLS termination in front of
#                    push-relay. Needs PUSH_RELAY_DOMAIN to actually
#                    resolve to this host before it can get a cert.
#   coturn         — TURN relay for calls behind a symmetric NAT. Optional:
#                    only needed if you want that specific NAT case to
#                    work; ordinary NATs already work via the public STUN
#                    default (BLACKHOLE_STUN_SERVERS).
services:
  bootstrap-node:
    build:
      context: ..
      dockerfile: infra/bootstrap-node/Dockerfile
    restart: unless-stopped
    ports:
      - "${BOOTSTRAP_PUBLIC_PORT:-4001}:4001/tcp"
    volumes:
      - bootstrap-data:/var/lib/blackhole/data
    # BLACKHOLE_PERSISTENT_NETWORK_IDENTITY / BLACKHOLE_KEYSTORE_BACKEND /
    # BLACKHOLE_NETWORK_LISTEN_ADDR are already set as defaults in the
    # Dockerfile itself — nothing to override here for the common case.

  push-relay:
    build:
      context: ..
      dockerfile: infra/push-relay/Dockerfile
    restart: unless-stopped
    expose:
      - "47900"
    environment:
      BLACKHOLE_PUSH_RELAY_PORT: "47900"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - push-relay
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
    environment:
      PUSH_RELAY_DOMAIN: "${PUSH_RELAY_DOMAIN:?set PUSH_RELAY_DOMAIN in infra/.env}"
    volumes:
      - ./caddy/Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    environment:
      TURN_REALM: "${TURN_REALM:?set TURN_REALM in infra/.env}"
      TURN_PUBLIC_IP: "${TURN_PUBLIC_IP:?set TURN_PUBLIC_IP in infra/.env}"
      TURN_USERNAME: "${TURN_USERNAME:?set TURN_USERNAME in infra/.env}"
      TURN_CREDENTIAL: "${TURN_CREDENTIAL:?set TURN_CREDENTIAL in infra/.env}"
    # The long-term credential used to be passed as a `--user=...`
    # command-line flag — visible in plaintext to anyone on the host who
    # can run `ps aux`/read `/proc/<pid>/cmdline`, or `docker inspect`/
    # `docker top` against the container, a lower-friction local exposure
    # on top of the already-accepted "this credential is leaked forever if
    # it leaks" risk the README calls out. `environment:` values aren't
    # immune to a sufficiently privileged local reader either, but they're
    # not in the default `ps`/`docker top` output, and writing the
    # credential into a generated config file coturn reads via `-c` (rather
    # than a CLI flag) means the actually-running `turnserver` process's
    # own argv never contains it either way.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        conf=/tmp/turnserver.generated.conf
        umask 077
        cat > "$$conf" <<EOF
        listening-port=3478
        tls-listening-port=5349
        min-port=49152
        max-port=65535
        realm=$$TURN_REALM
        server-name=$$TURN_REALM
        external-ip=$$TURN_PUBLIC_IP
        lt-cred-mech
        user=$$TURN_USERNAME:$$TURN_CREDENTIAL
        no-cli
        fingerprint
        stale-nonce=600
        EOF
        exec turnserver -n -c "$$conf"
    # `network_mode: host` because coturn negotiates real UDP relay ports
    # from min-port/max-port dynamically — Docker's normal per-port
    # publishing can't cover a 16k-port range sanely. Linux hosts only;
    # on Docker Desktop (macOS/Windows) run coturn on a real Linux box
    # instead (see ../systemd/ for the bare-metal path) since host
    # networking there doesn't expose the host's real interfaces the
    # same way.

volumes:
  bootstrap-data:
  caddy-data:
  caddy-config:
